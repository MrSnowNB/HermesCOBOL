version: '3.8'

services:
  cobol-vector-db:
    image: redis/redis-stack:latest
    container_name: cobol-vector-db
    ports:
      - "6380:6379"
      - "8002:8001" # Redis Insight
    environment:
      - REDIS_ARGS=--requirepass cobol123
    volumes:
      - cobol_redis_data:/data
    restart: always

volumes:
  cobol_redis_data:
    driver: local
