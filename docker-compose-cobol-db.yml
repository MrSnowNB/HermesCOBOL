# Canonical COBOL IR dictionary — plain Redis (no vector stack).
# Inference boundary: exact key GET only. No HNSW, no embeddings.
#
# Usage:
#   docker compose -f docker-compose-cobol-db.yml up -d
#   python ingest_redis_canonical.py
#
# Legacy vector experiment archived at: archive/vector_experiment/

services:
  cobol-ir-db:
    image: redis:7-alpine
    container_name: cobol-ir-db
    command: redis-server --requirepass cobol123 --save 60 1 --loglevel warning
    ports:
      - "6380:6379"
    volumes:
      - cobol_ir_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cobol123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cobol_ir_data:
    driver: local
